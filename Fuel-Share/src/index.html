<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="main-style.css">
    <link rel="manifest" href="manifest.json">
    <title>Fuel-Share</title>
</head>
<body>
    <div class="app-container"> 
        <div class="header"> 
            <h1 onclick="window.location.reload()">Fuel<span class="logo-animation">Share</span></h1> 
            <h3>versão: 0.0.0.15_ <span class="splash1">splash-1</span></h3>
        </div>

        <main class="main-content">
                                                                                                                                                                     
            <div class="home-screen">
                <h1><span id="greeting"></span>, <span id="user-name"></span>!</h1>
                <p class="subtitulo"><span id="current-city">Pouso Alegre</span> — <span id="lastUpdated">15 min</span></p>
                

                <div class="fuel-hero">
                    <div class="card-top">
                        <span>⛽ </span>
                        <span class="fuel-type">GASOLINA COMUM</span>
                    </div>
                    
                    <div class="price-container">
                        <span class="currency">R$</span>
                        <span class="fuel-price">6,32</span>
                        <span class="unit">/L</span>
                    </div>

                    <div class="card-bottom">
                        <span id="price-trend-tool" class="price-trend up">▼ -R$0,05 esta semana ▲</span>
                        <span id="low-price-local">🚗Shell Rodoviaria</span>
                    </div>

                </div>

                <div style="flex-grow: 1; min-height: 800px; width: 100%;"></div> 
                    
                <p class="license">© 2026 Fuel Share. All rights reserved.</p>
            </div>

            <div class="menu-valor"></div>
            <div class="menu-mapa"></div>

        </main>

        <nav class="nav-bottom">
            <button class="act1" active>A</button> 
            <button class="act2">B</button>
            <button class="act3">C</button>
        </nav>
    </div> 

    <script src="script.js"></script>
</body>
</html>
